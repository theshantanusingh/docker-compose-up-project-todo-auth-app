<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Done.</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: var(--white);">
    <header>
        <nav>
            <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">Done.</a></div>
            <div class="nav-links">
                <a href="login.html">Sign In</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="fade-in" style="padding-top: 15vh;">
            <h1>Create your account.</h1>
            <p>Ready to get things sorted? Sign up below.</p>
            
            <div class="form-container">
                <div id="auth-message"></div>
                <form id="signup-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="Apple Seed" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Choose a Password</label>
                        <input type="password" id="password" placeholder="Min. 8 characters" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Get Started</button>
                </form>
                <p style="margin-top: 20px; font-size: 14px; color: var(--text-secondary);">Already have an account? <a href="login.html" style="color: var(--primary); text-decoration: none;">Sign in here.</a></p>
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
